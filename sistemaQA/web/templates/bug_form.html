{% extends "base.html" %}
{% block title %}Editar Bug — Sistema QA{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('projetos') }}">Projetos</a>
  <span>›</span>
  <a href="{{ url_for('bugs', project_id=bug.project_id) }}">Bugs</a>
  <span>›</span> Editar Bug #{{ bug.id }}
</div>

<div class="card" style="max-width:700px;">
  <h2>Editar Bug</h2>
  <form method="post">
    <div class="form-group">
      <label>Título *</label>
      <input name="title" type="text" required value="{{ bug.title }}">
    </div>
    <div class="grid grid-2">
      <div class="form-group">
        <label>Severidade</label>
        <select name="severity">
          {% for s in SEVERITY %}<option value="{{ s }}" {% if s == bug.severity %}selected{% endif %}>{{ s }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Ambiente</label>
        <input name="environment" type="text" value="{{ bug.environment or '' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea name="description">{{ bug.description or '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Passos para reproduzir</label>
      <textarea name="steps_repro">{{ bug.steps_repro or '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Reportado por</label>
      <input name="reported_by" type="text" value="{{ bug.reported_by or '' }}">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" type="submit">Salvar</button>
      <a class="btn btn-outline" href="{{ url_for('bugs', project_id=bug.project_id) }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
